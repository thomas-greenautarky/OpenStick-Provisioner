# OpenStick Provisioner — Fleet Configuration
# Non-secret settings shared across all dongles in the fleet.

# LTE Access Point Name (carrier-specific)
#APN=internet.telekom
APN=inetd.vodafone.iot

# Timezone
TIMEZONE=Europe/Berlin

# Path to the OpenStick repo (relative or absolute)
OPENSTICK_REPO=../USB-Dongle-OpenStick

# SSH settings for dongle access during provisioning
DONGLE_IP=192.168.68.1
DONGLE_USER=root
DONGLE_PASS=openstick

# WiFi hotspot settings
WIFI_CHANNEL=6
WIFI_BAND=bg

# ─── USB access policy (RNDIS gadget) ───────────────────────────────────────
#
# The dongle exposes a USB ethernet gadget (RNDIS). Two things to decide:
#
#   1. Is the USB ethernet gadget enabled at all?     (DISABLE_RNDIS)
#   2. If yes, what can the USB host do with it?      (RNDIS_MODE)
#
# Decision matrix:
#
#   ┌───────────────────────────────┬──────────┬──────────┬────────────────────┐
#   │ Capability                    │ gateway  │ local    │ DISABLE_RNDIS=yes  │
#   ├───────────────────────────────┼──────────┼──────────┼────────────────────┤
#   │ USB gadget exists             │ yes      │ yes      │ no                 │
#   │ Host gets a DHCP IP via USB   │ yes      │ yes      │ no                 │
#   │ DHCP hands out gateway + DNS  │ yes      │ no       │ —                  │
#   │ Dongle forwards host traffic  │ yes      │ no       │ —                  │
#   │ SSH to dongle over USB        │ yes      │ yes      │ no  (LTE/NB only)  │
#   │ Host can surf via the dongle  │ yes      │ NO       │ NO                 │
#   │ WiFi hotspot clients surf     │ yes      │ yes      │ yes                │
#   └───────────────────────────────┴──────────┴──────────┴────────────────────┘
#
# The WiFi hotspot (GA-<IMEI-last-4>) is independent of these settings — its
# clients always get NAT'd internet via LTE. RNDIS_MODE only restricts what
# the USB host (the machine the dongle is physically plugged into) can do.
#
# Typical choices:
#   • Field deployment where the USB end-user must not route their traffic
#     through the dongle:                         DISABLE_RNDIS=no, RNDIS_MODE=local
#   • Laptop tethering (dongle IS the internet):  DISABLE_RNDIS=no, RNDIS_MODE=gateway
#   • Fully sealed, remote-only (NetBird mandatory, no USB fallback):
#                                                 DISABLE_RNDIS=yes
#
# Default below is the safe "SSH but no free internet" setup.

# Set to "yes" to disable the USB gadget entirely — dongle is then ONLY
# reachable via LTE/NetBird. If NetBird fails, recovery requires a re-flash.
DISABLE_RNDIS=no

# Only applies when DISABLE_RNDIS=no. See table above.
RNDIS_MODE=local

# Firmware/image version label for inventory tracking
FIRMWARE_VERSION=v1.0

# LTE reachability probe (used by test-provision.sh).
#
# We do NOT ping 8.8.8.8 — IoT APNs with FQDN-whitelist ACLs (like Vodafone
# `inetd.vodafone.iot`) blackhole raw-IP ICMP/TCP, so ping fails on otherwise
# fully-working SIMs. Instead we do an HTTPS GET to a whitelisted FQDN. A
# successful response proves DNS + TCP + TLS + Cert + system clock + ACL
# allowance — all in one check.
#
# Default `ghcr.io` is verified to work on the Greenautarky ACL. If your
# fleet's ACL doesn't include it, set to something that IS allowed, e.g.:
#   LTE_PROBE_URL=https://api.netbird.io/          # NetBird API endpoint
#   LTE_PROBE_URL=https://controlplane.tailscale.com/  # Tailscale coord
#   LTE_PROBE_URL=https://greenautarky.com/        # own backend
LTE_PROBE_URL=https://ghcr.io/
