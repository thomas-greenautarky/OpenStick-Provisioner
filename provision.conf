# OpenStick Provisioner — Fleet Configuration
# Non-secret settings shared across all dongles in the fleet.

# LTE Access Point Name (carrier-specific)
APN=internet.telekom

# Timezone
TIMEZONE=Europe/Berlin

# Path to the OpenStick repo (relative or absolute)
OPENSTICK_REPO=../USB-Dongle-OpenStick

# SSH settings for dongle access during provisioning
DONGLE_IP=192.168.68.1
DONGLE_USER=root
DONGLE_PASS=openstick

# WiFi hotspot settings
WIFI_CHANNEL=6
WIFI_BAND=bg

# Disable RNDIS USB gadget after provisioning (dongle only reachable via LTE/NetBird)
# Set to "yes" to disable — requires NetBird or other remote access!
DISABLE_RNDIS=no

# RNDIS network mode (only applies when DISABLE_RNDIS=no)
#   gateway — dongle shares LTE internet via USB (DHCP with gateway + DNS + NAT)
#             laptop/PC routes internet traffic through the dongle
#   local   — USB ethernet for SSH only (DHCP with IP only, no gateway/DNS/NAT)
#             laptop/PC keeps its own internet connection unchanged
RNDIS_MODE=local

# Firmware/image version label for inventory tracking
FIRMWARE_VERSION=v1.0
